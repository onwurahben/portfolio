<svg width="280" height="420" viewBox="0 0 280 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .node {
        fill: #ffffff;
        stroke: #e8ecf0;
        stroke-width: 0.8;
        rx: 8;
      }
      .label {
        font-family: 'Fraunces', 'Georgia', serif;
        font-size: 13px;
        fill: #9ca3af;
        font-weight: 400;
        font-style: italic;
      }
      .arrow {
        stroke: #6385fd;
        stroke-width: 1;
        fill: none;
        opacity: 0.4;
        marker-end: url(#arrow);
      }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6385fd"/>
    </marker>
  </defs>

  <!-- Step 1: Input -->
  <rect x="65" y="20" width="150" height="44" class="node"/>
  <text x="140" y="47" text-anchor="middle" class="label">Input</text>

  <path d="M140 64 L140 100" class="arrow"/>

  <!-- Step 2: Orchestration -->
  <rect x="65" y="100" width="150" height="44" class="node"/>
  <text x="140" y="127" text-anchor="middle" class="label">Orchestration</text>

  <path d="M140 144 L140 180" class="arrow"/>

  <!-- Step 3: Retrieval -->
  <rect x="65" y="180" width="150" height="44" class="node"/>
  <text x="140" y="207" text-anchor="middle" class="label">Retrieval</text>

  <path d="M140 224 L140 260" class="arrow"/>

  <!-- Step 4: Intelligence -->
  <rect x="65" y="260" width="150" height="44" class="node"/>
  <text x="140" y="287" text-anchor="middle" class="label">Intelligence</text>

  <path d="M140 304 L140 340" class="arrow"/>

  <!-- Step 5: Response -->
  <rect x="65" y="340" width="150" height="44" class="node"/>
  <text x="140" y="367" text-anchor="middle" class="label">Response</text>

  <!-- End dot -->
  <path d="M140 384 L140 401" class="arrow"/>
  <circle cx="140" cy="405" r="4" fill="#6385fd" opacity="0.5"/>
</svg>
